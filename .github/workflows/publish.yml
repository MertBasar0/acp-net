name: Publish NuGet Alpha

on:
  workflow_dispatch:
    inputs:
      confirm_publish:
        description: Type publish to push packages to NuGet.
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish alpha packages
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event.inputs.confirm_publish == 'publish' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x
            8.0.x

      - name: Verify target version is not already published
        run: |
          set -euo pipefail
          version=$(grep -oPm1 '(?<=<Version>)[^<]+' src/acp-net/Acp.Net.Process/Acp.Net.Process.csproj)
          echo "Publishing version: ${version}"
          for id in acp.net.process acp.net.testing; do
            status=$(curl -sS -o /dev/null -w "%{http_code}" "https://api.nuget.org/v3-flatcontainer/${id}/index.json")
            if [ "$status" = "404" ]; then
              echo "${id}: not yet published (first release)."
              continue
            fi
            if [ "$status" != "200" ]; then
              echo "${id}: unexpected HTTP ${status} from NuGet; refusing to publish."
              exit 1
            fi
            if curl -sS "https://api.nuget.org/v3-flatcontainer/${id}/index.json" | grep -q "\"${version}\""; then
              echo "${id} ${version} is already published; refusing to republish the same version."
              exit 1
            fi
            echo "${id}: ${version} is new."
          done

      - name: Test
        run: dotnet test src/acp-net/AcpNetMvp.slnx --logger "console;verbosity=minimal"

      - name: Pack
        run: |
          dotnet pack src/acp-net/Acp.Net.Process/Acp.Net.Process.csproj --configuration Release --output artifacts/packages
          dotnet pack src/acp-net/Acp.Net.Testing/Acp.Net.Testing.csproj --configuration Release --output artifacts/packages

      - name: Verify doctor adapter draft
        run: node src/openclaw-probe/verify-doctor-adapter-draft.mjs

      # Trusted Publishing: exchanges the GitHub Actions OIDC token for a
      # short-lived NuGet API key. Requires a matching trusted publishing
      # policy on nuget.org (repository, workflow file, and environment).
      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: Mertbasar0

      - name: Push packages
        run: |
          set -euo pipefail
          dotnet nuget push "artifacts/packages/*.nupkg" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate

      - name: Push symbol packages
        run: |
          set -euo pipefail
          dotnet nuget push "artifacts/packages/*.snupkg" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate
